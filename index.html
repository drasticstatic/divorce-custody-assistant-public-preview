<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="https://drasticstatic.github.io/favicon.svg" type="image/svg+xml"/>
    <link rel="apple-touch-icon" href="https://drasticstatic.github.io/apple-touch-icon.png"/>
    <title>Divorce & Custody Assistant — Public Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --panel: rgba(15, 23, 42, 0.88);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --border: rgba(148, 163, 184, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 32%),
          linear-gradient(180deg, #0f172a 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        width: min(100%, 640px);
        padding: 40px 32px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.45);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 12px;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 5vw, 3.4rem);
        line-height: 1.05;
      }

      p {
        margin: 18px auto 0;
        max-width: 34rem;
        font-size: 1rem;
        line-height: 1.7;
        color: var(--muted);
      }

      a {
        display: inline-block;
        margin-top: 28px;
        padding: 14px 20px;
        border-radius: 999px;
        background: var(--accent);
        color: #082f49;
        font-weight: 700;
        text-decoration: none;
      }

      a:hover,
      a:focus-visible {
        filter: brightness(1.08);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Public Preview</p>
      <h1>Nothing here yet</h1>
      <p>
        This landing page is intentionally minimal while the private working repository remains the
        source of truth.
      </p>
      <a href="https://github.com/drasticstatic/divorce-custody-assistant-public-preview">Back to GitHub</a>
    </main>
  </body>
</html>
